server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy metrics endpoints to each backend service
    location /api/mono/ {
        proxy_pass http://monolithic:3001/;
    }
    location /api/ms/ {
        proxy_pass http://ms-gateway:3002/;
    }
    location /api/hybrid/ {
        proxy_pass http://hybrid-gateway:3003/;
    }
}
