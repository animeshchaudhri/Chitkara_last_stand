version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hybrid_db
    ports:
      - "5435:5432"

  hybrid-app:
    build: ./app
    environment:
      PORT: 3021
      JWT_SECRET: hybrid_secret_key_2024
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hybrid_db
    ports:
      - "3021:3021"
    depends_on:
      - postgres

  hybrid-gateway:
    build: ./gateway
    environment:
      PORT: 3003
      JWT_SECRET: hybrid_secret_key_2024
      APP_URL: http://hybrid-app:3021
    ports:
      - "3003:3003"
    depends_on:
      - hybrid-app
